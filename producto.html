<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Producto</title>
</head>
<body>

<h2>Cálculo de Producto</h2>

<form onsubmit="return calcularProducto();">
  Número 1:
  <input type="number" id="num1" required><br><br>    

  Número 2:
  <input type="number" id="num2" required><br><br>

  <button type="submit">Multiplicar</button>
</form>

<script>
function calcularProducto() {
  let n1 = document.getElementById("num1").value;
  let n2 = document.getElementById("num2").value;

  n1 = parseInt(n1);
  n2 = parseInt(n2);

 
  if (isNaN(n1) || isNaN(n2)) {
    alert("Debe Ingresar solo números enteros."); 
    return false;  
  }

  if (n1 <= 0 || n2 <= 0) {
    alert("Solo se permiten números enteros positivos mayores a cero.");
    return false;
  }

  let resultado = n1 * n2;
  alert("El Resultado de la Multiplicación es: " + resultado);
  return false;
}
</script>


</body>
</html>
